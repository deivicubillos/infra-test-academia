name: CI Academia Pipeline

# El robot se activa cada vez que subes código (push) a la rama main
on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest # El robot usa un Ubuntu limpio en la nube

    steps:
      - name: 1. Descargar código
        uses: actions/checkout@v3

      - name: 2. Validar Dockerfile (Linting)
        run: |
          # Esto verifica que el Dockerfile no tenga errores de sintaxis
          docker build -t test-image ./app

      - name: 3. Escaneo de Seguridad (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'test-image'
          format: 'table'
          severity: 'CRITICAL,HIGH'

      - name: 4. Prueba de funcionamiento (Unit Test)
        run: |
          # Levantamos un contenedor temporal para ver si responde
          docker run -d --name test-app -p 5000:5000 test-image
          sleep 5
          curl --fail http://localhost:5000 || exit 1
          docker rm -f test-app

      - name: 5. Validar Orquestación (Compose)
        run: |
          # Verifica que el archivo de Swarm sea válido
          docker compose config
